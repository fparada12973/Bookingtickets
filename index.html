<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Theater Booking MVP</title>

  <!-- Tailwind -->

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Custom CSS -->

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
    }

    /* Stage style */
    .stage {
      background: linear-gradient(to right, #d4af37, #f5e6a5);
      color: black;
      font-weight: bold;
      letter-spacing: 2px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    /* Seat base */
    .seat {
      width: 45px;
      height: 45px;
      border-radius: 10px 10px 6px 6px;
      font-size: 12px;
      font-weight: bold;
      transition: all 0.2s ease;
    }

    /* Available */
    .seat.available {
      background-color: #8b0000;
    }

    .seat.available:hover {
      transform: scale(1.1);
      background-color: #a00000;
    }

    /* Selected */
    .seat.selected {
      background-color: gold;
      color: black;
      transform: scale(1.1);
    }

    /* Booked */
    .seat.booked {
      background-color: #444;
      cursor: not-allowed;
    }

    /* Row label */
    .row-label {
      width: 30px;
      text-align: center;
      font-weight: bold;
    }
  </style>

</head>

  <div id="app" class="hidden w-full max-w-4xl mt-6">

<script>
  let currentUser = null;

  function mockLogin() {
    const email = document.getElementById("email").value;
    if (!email) return alert("Enter email");

    currentUser = { uid: "12345", email };

    document.getElementById("auth-section").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");

    renderSeats();
  }

  const rows = ["A","B","C","D","E"];
  const seatsPerRow = 5;

  const seats = [];
  const selectedSeats = new Set();

  rows.forEach(row => {
    for (let i = 1; i <= seatsPerRow; i++) {
      seats.push({
        id: row + i,
        booked: false,
        bookedBy: null
      });
    }
  });

  function renderSeats() {
    const container = document.getElementById("seat-grid");
    container.innerHTML = "";

    rows.forEach(row => {
      const rowDiv = document.createElement("div");
      rowDiv.className = "flex items-center justify-center gap-2";

      const label = document.createElement("div");
      label.className = "row-label";
      label.innerText = row;

      rowDiv.appendChild(label);

      seats
        .filter(s => s.id.startsWith(row))
        .forEach(seat => {
          const btn = document.createElement("button");
          btn.innerText = seat.id;
          btn.classList.add("seat");

          if (seat.booked) btn.classList.add("booked");
          else if (selectedSeats.has(seat.id)) btn.classList.add("selected");
          else btn.classList.add("available");

          btn.onclick = () => {
            if (seat.booked) return;

            if (selectedSeats.has(seat.id)) selectedSeats.delete(seat.id);
            else selectedSeats.add(seat.id);

            updateTotal();
            renderSeats();
          };

          rowDiv.appendChild(btn);
        });

      container.appendChild(rowDiv);
    });
  }

  function updateTotal() {
    const adults = parseInt(document.getElementById("adultCount").value) || 0;
    const children = parseInt(document.getElementById("childCount").value) || 0;

    const total = adults * 20 + children * 10;
    document.getElementById("totalPrice").innerText = total;
  }

  document.getElementById("adultCount").addEventListener("input", updateTotal);
  document.getElementById("childCount").addEventListener("input", updateTotal);

  function confirmBooking() {
    const adults = parseInt(document.getElementById("adultCount").value) || 0;
    const children = parseInt(document.getElementById("childCount").value) || 0;
    const totalTickets = adults + children;

    if (totalTickets === 0) return alert("Select tickets");

    if (selectedSeats.size !== totalTickets)
      return alert("Seats must match tickets");

    selectedSeats.forEach(id => {
      const seat = seats.find(s => s.id === id);
      seat.booked = true;
      seat.bookedBy = currentUser.uid;
    });

    selectedSeats.clear();
    renderSeats();

    alert("🎭 Booking confirmed!");
  }
</script>
