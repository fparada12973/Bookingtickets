<script>
  let currentUser = null;

  function mockLogin() {
    const email = document.getElementById("email").value;
    if (!email) return alert("Enter email");

    currentUser = { uid: "12345", email };

    document.getElementById("auth-section").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");

    renderSeats();
  }

  // Seat Data
  const seats = [];
  const selectedSeats = new Set();

  for (let i = 1; i <= 25; i++) {
    seats.push({
      id: "S" + i,
      booked: false,
      bookedBy: null
    });
  }

  function renderSeats() {
    const grid = document.getElementById("seat-grid");
    grid.innerHTML = "";

    seats.forEach(seat => {
      const btn = document.createElement("button");
      btn.innerText = seat.id;

      let baseClass = "p-4 rounded text-white ";

      if (seat.booked) {
        btn.className = baseClass + "bg-red-500 cursor-not-allowed";
      } else if (selectedSeats.has(seat.id)) {
        btn.className = baseClass + "bg-yellow-500";
      } else {
        btn.className = baseClass + "bg-blue-500";
      }

      btn.onclick = () => {
        if (seat.booked) return;

        if (selectedSeats.has(seat.id)) {
          selectedSeats.delete(seat.id);
        } else {
          selectedSeats.add(seat.id);
        }

        updateTotal();
        renderSeats();
      };

      grid.appendChild(btn);
    });
  }

  function updateTotal() {
    const adults = parseInt(document.getElementById("adultCount").value) || 0;
    const children = parseInt(document.getElementById("childCount").value) || 0;

    const total = (adults * 20) + (children * 10);
    document.getElementById("totalPrice").innerText = total;

    console.log("Total price:", total);
  }

  document.getElementById("adultCount").addEventListener("input", updateTotal);
  document.getElementById("childCount").addEventListener("input", updateTotal);

  function confirmBooking() {
    const adults = parseInt(document.getElementById("adultCount").value) || 0;
    const children = parseInt(document.getElementById("childCount").value) || 0;
    const totalTickets = adults + children;

    if (totalTickets === 0) {
      alert("Select at least one ticket");
      return;
    }

    if (selectedSeats.size !== totalTickets) {
      alert("Number of seats must match number of tickets");
      return;
    }

    selectedSeats.forEach(id => {
      const seat = seats.find(s => s.id === id);
      seat.booked = true;
      seat.bookedBy = currentUser.uid;
    });

    console.log("Booking saved (mock):", {
      seats: Array.from(selectedSeats),
      adults,
      children
    });

    selectedSeats.clear();
    renderSeats();

    alert("Booking successful!");
  }
</script>

</body>
